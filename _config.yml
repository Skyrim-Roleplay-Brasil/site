description: Wiki oficial do Skyrim Roleplay Brasil — servidor brasileiro de Skyrim Special Edition multiplayer com lore original da Quinta Era.
theme: jekyll-theme-cayman  # ou outro tema clean; o CSS custom sobrepõe

include:
